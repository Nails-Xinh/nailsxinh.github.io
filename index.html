<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haute Nails Couture - Premium Press-On Nails</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap');

        :root {
            --accent-gold: #d4af37;
            --bg-dark: #0d0d0d;
            --surface-dark: #161616;
            --text-light: #ffffff;
            --text-muted: #b3b3b3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-dark); color: var(--text-light); font-family: 'Montserrat', sans-serif; overflow-x: hidden; }

        /* HEADER */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: rgba(13, 13, 13, 0.95); border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .brand-logo { font-family: 'Cinzel', serif; font-size: 24px; color: var(--accent-gold); text-transform: uppercase; }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .contact-link { display: inline-flex; align-items: center; gap: 8px; padding: 8px 18px; border-radius: 30px; font-size: 13px; text-decoration: none; color: #fff; text-transform: uppercase; font-weight: 600; }
        .zalo { background-color: #0068ff; }
        .instagram { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #bc1888); }
        
        .lang-toggle { display: flex; border: 1px solid #333; border-radius: 4px; overflow: hidden; }
        .lang-btn { background: transparent; border: none; color: var(--text-muted); padding: 6px 12px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .lang-btn.active { background-color: var(--accent-gold); color: #000; }

        /* MARQUEE */
        .marquee-container { width: 100%; overflow: hidden; padding: 40px 0; background: #0a0a0a; position: relative; }
        .marquee-track { display: flex; gap: 20px; animation: scrollMarquee 80s linear infinite; }
        .marquee-item { min-width: 280px; background: var(--surface-dark); border-radius: 12px; border: 1px solid #222; overflow: hidden; }
        .marquee-item img { width: 100%; height: 300px; object-fit: cover; }
        .marquee-text { padding: 15px; font-size: 12px; text-align: center; color: var(--text-muted); }

        /* LƯỚI SẢN PHẨM */
        .store-section { max-width: 1200px; margin: 60px auto; padding: 0 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .product-card { background: var(--surface-dark); border-radius: 10px; overflow: hidden; border: 1px solid #222; }
        .product-card img { width: 100%; height: 350px; object-fit: cover; }
        .product-info { padding: 20px; text-align: center; }
        .cart-action-btn { display: block; margin-top: 15px; padding: 12px; border: 1px solid var(--accent-gold); color: var(--accent-gold); text-decoration: none; border-radius: 4px; font-size: 13px; text-transform: uppercase; font-weight: 700; }

        @keyframes scrollMarquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    </style>
</head>
<body>

    <header>
        <div class="brand-logo">Haute Couture</div>
        <div class="nav-right">
            <a href="#" id="header-social-btn" class="contact-link zalo" target="_blank"><span id="header-social-text">Zalo Đặt Hàng</span></a>
            <div class="lang-toggle">
                <button class="lang-btn active" id="btn-vi" onclick="toggleLanguage('vi')">VI</button>
                <button class="lang-btn" id="btn-en" onclick="toggleLanguage('en')">EN</button>
            </div>
        </div>
    </header>

    <section style="text-align:center; padding: 60px 20px;">
        <h1 id="main-hero-title" style="color:#fff;">Đừng chỉ diện trang phục, hãy kiêu sa đến từng đầu ngón tay</h1>
        <p id="main-hero-desc" style="color:var(--text-muted); font-style:italic;">Mỗi bộ Press-on Nails là một câu chuyện nghệ thuật riêng biệt.</p>
    </section>

    <div class="marquee-container"><div class="marquee-track" id="marquee-track"></div></div>

    <section class="store-section">
        <div class="product-grid" id="product-grid"></div>
    </section>

    <script>
        const ACCOUNT_ZALO = "https://zalo.me/YOUR_ZALO_PHONE";
        const ACCOUNT_INSTAGRAM = "https://instagram.com/YOUR_INSTAGRAM_USER";

        // Anh thêm hình tại đây, tối đa 20 hình cho dòng chạy
        const marqueeData = [
            { img: "IMG01.jpg", vi: "Nét kiêu kỳ Á Đông", en: "Asian Elegance" },
            { img: "IMG02.jpg", vi: "Trẻ trung cá tính", en: "Youthful Vibe" },
            { img: "IMG03.jpg", vi: "Nghệ thuật đại dương", en: "Ocean Art" },
            { img: "IMG04.jpg", vi: "Sắc tím mộng mơ", en: "Dreamy Violet" },
            { img: "IMG05.jpg", vi: "Espresso nồng nàn", en: "Rich Espresso" },
            { img: "IMG06.jpg", vi: "Sự ngọt ngào tinh tế", en: "Pure Sweetness" },
            { img: "IMG07.jpg", vi: "Chrome tương lai", en: "Future Chrome" },
            { img: "IMG08.jpg", vi: "Thiết kế độc bản", en: "Unique Design" },
            { img: "IMG09.jpg", vi: "Đỉnh cao Press-on", en: "Premium Press-on" },
            { img: "IMG10.jpg", vi: "Sang chảnh tuyệt đối", en: "Luxury Style" }
            // Anh có thể copy thêm dòng và đổi tên file vào đây...
        ];

        function init() {
            const track = document.getElementById('marquee-track');
            track.innerHTML = [...marqueeData, ...marqueeData].map(item => `
                <div class="marquee-item">
                    <img src="${item.img}" alt="Nails">
                    <div class="marquee-text">${item.vi}</div>
                </div>
            `).join('');

            const grid = document.getElementById('product-grid');
            grid.innerHTML = marqueeData.slice(0, 8).map(item => `
                <div class="product-card">
                    <img src="${item.img}" alt="Product">
                    <div class="product-info">
                        <h3>Nails Couture</h3>
                        <a href="${ACCOUNT_ZALO}" class="cart-action-btn dynamic-cart">Đặt Hàng Ngay</a>
                    </div>
                </div>
            `).join('');
        }

        function toggleLanguage(lang) {
            document.getElementById('btn-vi').classList.toggle('active', lang === 'vi');
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            
            const isVi = (lang === 'vi');
            document.getElementById('header-social-btn').className = isVi ? "contact-link zalo" : "contact-link instagram";
            document.getElementById('header-social-text').textContent = isVi ? "Zalo Đặt Hàng" : "Instagram Shop";
            document.getElementById('header-social-btn').href = isVi ? ACCOUNT_ZALO : ACCOUNT_INSTAGRAM;
            
            document.querySelectorAll('.dynamic-cart').forEach(btn => {
                btn.textContent = isVi ? "Đặt Hàng Ngay" : "Order Now";
                btn.href = isVi ? ACCOUNT_ZALO : ACCOUNT_INSTAGRAM;
            });
        }

        document.addEventListener('DOMContentLoaded', () => { init(); toggleLanguage('vi'); });
    </script>
</body>
</html>
