<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Haute Nails Couture - Premium Press-On Nails</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap');
        :root { --accent-gold: #d4af37; --bg-dark: #0d0d0d; --surface-dark: #161616; --text-light: #ffffff; --text-muted: #b3b3b3; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-dark); color: var(--text-light); font-family: 'Montserrat', sans-serif; overflow-x: hidden; }

        /* HEADER */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: rgba(13, 13, 13, 0.95); border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .brand-logo { font-family: 'Cinzel', serif; font-size: 24px; color: var(--accent-gold); text-transform: uppercase; }
        .nav-right { display: flex; align-items: center; gap: 15px; }
        .btn-action { padding: 8px 16px; border-radius: 20px; font-size: 12px; text-decoration: none; color: #fff; font-weight: 600; text-transform: uppercase; }
        .btn-zalo { background-color: #0068ff; }
        .btn-mess { background-color: #0084ff; }
        .lang-toggle { display: flex; border: 1px solid #333; border-radius: 4px; overflow: hidden; }
        .lang-btn { background: transparent; border: none; color: var(--text-muted); padding: 5px 10px; font-size: 11px; cursor: pointer; }
        .lang-btn.active { background-color: var(--accent-gold); color: #000; }

        /* MARQUEE TỐC ĐỘ CAO */
        .marquee-container { width: 100%; overflow: hidden; padding: 40px 0; background: #0a0a0a; cursor: pointer; }
        .marquee-track { display: flex; gap: 20px; animation: scrollMarquee 15s linear infinite; } /* Tốc độ nhanh hơn */
        .marquee-item { min-width: 200px; background: var(--surface-dark); border-radius: 8px; overflow: hidden; border: 1px solid #222; transition: transform 0.3s; }
        .marquee-item:hover { transform: scale(1.05); border-color: var(--accent-gold); }
        .marquee-item img { width: 100%; height: 200px; object-fit: cover; }
        .marquee-text { padding: 8px; font-size: 10px; text-align: center; }

        /* LƯỚI SẢN PHẨM */
        .store-section { max-width: 1200px; margin: 60px auto; padding: 0 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }
        .product-card { background: var(--surface-dark); border-radius: 8px; overflow: hidden; border: 1px solid #222; scroll-margin-top: 100px; }
        .product-card img { width: 100%; height: 280px; object-fit: cover; }
        .product-info { padding: 15px; text-align: center; }
        .btn-buy { display: block; margin: 10px 0; padding: 10px; border: 1px solid var(--accent-gold); color: var(--accent-gold); text-decoration: none; border-radius: 4px; font-size: 12px; text-transform: uppercase; }
        .btn-call { color: #fff; text-decoration: underline; font-size: 11px; }

        @keyframes scrollMarquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    </style>
</head>
<body>

    <header>
        <div class="brand-logo">Haute Couture</div>
        <div class="nav-right">
            <a href="https://zalo.me/YOUR_PHONE" class="btn-action btn-zalo" id="txt-zalo">Zalo</a>
            <a href="https://m.me/YOUR_PAGE" class="btn-action btn-mess" id="txt-mess">Messenger</a>
            <div class="lang-toggle">
                <button class="lang-btn active" onclick="setLang('vi')" id="btn-vi">VI</button>
                <button class="lang-btn" onclick="setLang('en')" id="btn-en">EN</button>
            </div>
        </div>
    </header>

    <div class="marquee-container" onclick="window.scrollTo({top: document.getElementById('store-section').offsetTop - 100, behavior: 'smooth'})">
        <div class="marquee-track" id="marquee-track"></div>
    </div>

    <section class="store-section" id="store-section">
        <div class="product-grid" id="product-grid"></div>
    </section>

    <script>
        const marqueeData = Array.from({ length: 45 }, (_, i) => ({
            id: `item-${i}`,
            img: `IMG${(i + 1).toString().padStart(2, '0')}.jpg`,
            vi: `Mẫu ${i + 1}`, en: `Design ${i + 1}`
        }));

        function init() {
            const track = document.getElementById('marquee-track');
            track.innerHTML = [...marqueeData, ...marqueeData].map(item => `
                <div class="marquee-item" onclick="document.getElementById('${item.id}').scrollIntoView({behavior:'smooth'})">
                    <img src="${item.img}" alt="Nails">
                    <div class="marquee-text">${item.vi}</div>
                </div>
            `).join('');

            const grid = document.getElementById('product-grid');
            grid.innerHTML = marqueeData.map(item => `
                <div class="product-card" id="${item.id}">
                    <img src="${item.img}" alt="Product">
                    <div class="product-info">
                        <h3 style="margin-bottom:10px">Nails Couture</h3>
                        <a href="https://zalo.me/YOUR_PHONE" class="btn-buy dynamic-text">Đặt Hàng Ngay</a>
                        <a href="tel:0909000000" class="btn-call dynamic-call">Gọi Tư Vấn</a>
                    </div>
                </div>
            `).join('');
        }

        function setLang(lang) {
            document.getElementById('btn-vi').classList.toggle('active', lang === 'vi');
            document.getElementById('btn-en').classList.toggle('active', lang === 'en');
            document.querySelectorAll('.dynamic-text').forEach(el => el.textContent = lang === 'vi' ? 'Đặt Hàng Ngay' : 'Order Now');
            document.querySelectorAll('.dynamic-call').forEach(el => el.textContent = lang === 'vi' ? 'Gọi Tư Vấn' : 'Call Support');
        }

        init();
    </script>
</body>
</html>
