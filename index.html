<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hana Nails Couture</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400&display=swap');
        :root { --gold: #d4af37; --deep-purple: #1a0b2e; --surface-purple: #2d164d; --text-light: #ffffff; }
        body { background-color: var(--deep-purple); color: var(--text-light); font-family: 'Montserrat', sans-serif; margin: 0; }

        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: #1a0b2e; border-bottom: 1px solid #332050; position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--gold); border: 1px solid var(--gold); padding: 5px 15px; }

        /* DẢI CHỮ CHẠY (TỐC ĐỘ 90S - THƯ THÁI) */
        .ticker-container { background: #120822; padding: 15px 0; overflow: hidden; border-top: 1px solid var(--gold); border-bottom: 1px solid var(--gold); margin: 20px 0; }
        .ticker-track { display: flex; white-space: nowrap; animation: scrollMarquee 90s linear infinite; font-family: 'Playfair Display', serif; font-style: italic; color: var(--gold); font-size: 20px; }
        .ticker-item { margin-right: 100px; }

        .marquee-container { width: 100%; overflow: hidden; background: #0e061a; padding: 20px 0; }
        .marquee-track { display: flex; gap: 20px; animation: scrollMarquee 90s linear infinite; width: max-content; }
        .marquee-item { width: 200px; height: 200px; border-radius: 8px; overflow: hidden; border: 1px solid #4a148c; }
        .marquee-item img { width: 100%; height: 100%; object-fit: cover; }

        .store-section { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .product-card { background: #2d164d; border-radius: 8px; padding: 10px; border: 1px solid #4a148c; }
        .btn-buy { display: block; margin-top: 10px; padding: 10px; background: var(--gold); color: #000; text-align: center; text-decoration: none; border-radius: 4px; font-weight: bold; font-size: 11px; text-transform: uppercase; }
        
        @keyframes scrollMarquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    </style>
</head>
<body>

    <header>
        <div class="logo">Hana Nails</div>
        <div style="display: flex; gap: 10px;">
            <a href="https://zalo.me/0937244764" class="btn-buy" style="background:#0068ff; color:#fff; margin:0;">Zalo</a>
            <a href="https://m.me/100088924357778" class="btn-buy" style="background:#0084ff; color:#fff; margin:0;">Mess</a>
        </div>
    </header>

    <!-- Dải chữ chạy chứa 6 câu thông điệp -->
    <div class="ticker-container">
        <div class="ticker-track" id="ticker-track"></div>
    </div>
    
    <div class="marquee-container"><div class="marquee-track" id="marquee-track"></div></div>
    
    <section class="store-section"><div class="product-grid" id="product-grid"></div></section>

    <script>
        // Danh sách 6 câu quảng cáo
        const msgs = [
            "Đừng chỉ làm móng, hãy tạo nên tuyên ngôn của riêng bạn.",
            "Vẻ đẹp không nằm ở sự cầu kỳ, nó nằm ở sự tinh tế trong từng đường nét.",
            "Hãy để chúng tôi lắng nghe câu chuyện của bạn qua từng thiết kế nail.",
            "Nhấn đặt hàng ngay để cùng chúng tôi tạo nên phiên bản hoàn hảo nhất của chính mình.",
            "Đôi bàn tay biết nói - hãy để Hana Nails giúp bạn cất tiếng.",
            "Nâng niu từng ngón tay, trân trọng từng khoảnh khắc làm đẹp của quý khách."
        ];

        const ticker = document.getElementById('ticker-track');
        msgs.forEach(text => {
            ticker.innerHTML += `<div class="ticker-item">${text}</div>`;
        });
        ticker.innerHTML += ticker.innerHTML; // Nhân đôi để chạy không ngắt quãng

        const grid = document.getElementById('product-grid');
        const track = document.getElementById('marquee-track');
        for(let i=1; i<=45; i++) {
            let imgName = `IMG${i.toString().padStart(2, '0')}.jpg`;
            grid.innerHTML += `<div class="product-card"><img src="${imgName}" style="width:100%; height:200px; object-fit:cover; border-radius:4px;"><a href="https://m.me/100088924357778" class="btn-buy">Đặt Hàng Ngay</a></div>`;
            track.innerHTML += `<div class="marquee-item"><img src="${imgName}"></div>`;
        }
        track.innerHTML += track.innerHTML; 
    </script>
</body>
</html>
