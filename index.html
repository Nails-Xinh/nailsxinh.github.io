<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hana Nails Couture</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400&display=swap');
        :root { --gold: #d4af37; --deep-purple: #1a0b2e; --surface-purple: #2d164d; --text-light: #ffffff; }
        body { background-color: var(--deep-purple); color: var(--text-light); font-family: 'Montserrat', sans-serif; margin: 0; }

        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: #1a0b2e; border-bottom: 1px solid var(--gold); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--gold); border: 1px solid var(--gold); padding: 5px 15px; }
        .nav-group { display: flex; align-items: center; gap: 8px; }
        .nav-btn { background: var(--gold); color: #000; padding: 8px 10px; border-radius: 4px; text-decoration: none; font-weight: bold; font-size: 10px; text-transform: uppercase; border: none; cursor: pointer; }
        /* Hotline nằm ngang, chuyên nghiệp */
        .hotline-bar { font-size: 14px; color: var(--gold); font-weight: bold; margin-right: 20px; text-decoration: none; border: 1px solid var(--gold); padding: 5px 15px; border-radius: 4px; }

        .ads-section { text-align: center; padding: 40px 5%; font-family: 'Playfair Display', serif; font-size: 20px; color: var(--gold); font-style: italic; }
        .marquee-container { width: 100%; overflow: hidden; background: #0e061a; padding: 20px 0; border-bottom: 1px solid #332050; }
        .marquee-track { display: flex; gap: 20px; animation: scrollMarquee 90s linear infinite; width: max-content; }
        .marquee-item { width: 180px; height: 180px; border-radius: 8px; overflow: hidden; border: 1px solid #4a148c; }
        .marquee-item img { width: 100%; height: 100%; object-fit: contain; background: #000; }

        .store-section { max-width: 1000px; margin: 20px auto; padding: 0 20px; }
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 20px; }
        .product-card { background: #2d164d; border-radius: 8px; padding: 10px; border: 1px solid #4a148c; }
        .product-img { width: 100%; height: 250px; object-fit: contain; background: #1a0b2e; border-radius: 4px; }
        .btn-buy { display: block; margin-top: 10px; padding: 12px; background: var(--gold); color: #000; text-align: center; text-decoration: none; border-radius: 4px; font-weight: bold; font-size: 12px; text-transform: uppercase; }
        
        @keyframes scrollMarquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    </style>
</head>
<body>

    <header>
        <div class="logo">Hana Nails</div>
        <div class="nav-group">
            <a href="tel:0937244764" class="hotline-bar">Hotline: 0937 244 764</a>
            <a href="https://zalo.me/0937244764" class="nav-btn" style="background:#0068ff; color:#fff;">Zalo</a>
            <a href="https://m.me/100088924357778" class="nav-btn" style="background:#0084ff; color:#fff;">Mess</a>
            <a href="https://www.instagram.com/hana26096" class="nav-btn" style="background:linear-gradient(45deg, #f09433, #dc2743); color:#fff;">Insta</a>
            <button class="nav-btn" onclick="setLang('vi')">VI</button>
            <button class="nav-btn" onclick="setLang('en')">EN</button>
        </div>
    </header>

    <div class="ads-section" id="welcome-msg">Cảm ơn quý khách, chúc quý khách một ngày thật nhiều may mắn, nhiều niềm vui và nhiều hạnh phúc.</div>
    <div class="marquee-container"><div class="marquee-track" id="marquee-track"></div></div>

    <section class="store-section" id="main-content"></section>

    <script>
        const msgs = [
            "Vẻ đẹp của quý khách là nguồn cảm hứng bất tận của chúng tôi.",
            "Hãy để Hana Nails tôn vinh phong thái quý phái của riêng bạn.",
            "Đẳng cấp nằm trong tầm tay, phong cách nằm ở sự lựa chọn của bạn.",
            "Sứ mệnh của chúng tôi là làm nổi bật sự độc bản trong mỗi quý khách hàng.",
            "Từng đường nét thiết kế là một món quà dành riêng cho vẻ đẹp của bạn.",
            "Khẳng định vị thế người dẫn đầu phong cách với những tuyệt phẩm nail.",
            "Sự hài lòng của quý khách chính là thước đo giá trị cho nghệ thuật của chúng tôi.",
            "Trở thành phiên bản rực rỡ nhất của chính mình ngay từ hôm nay."
        ];

        const container = document.getElementById('main-content');
        const track = document.getElementById('marquee-track');
        
        for(let i=1; i<=45; i++) {
            if (i % 2 === 1) container.innerHTML += `<div class="product-grid" id="grid-${Math.ceil(i/2)}"></div>`;
            
            let imgName = `IMG${i.toString().padStart(2, '0')}.jpg`;
            document.getElementById(`grid-${Math.ceil(i/2)}`).innerHTML += `<div class="product-card"><img src="${imgName}" class="product-img"><a href="https://m.me/100088924357778" class="btn-buy">Đặt Hàng Ngay</a></div>`;
            track.innerHTML += `<div class="marquee-item"><img src="${imgName}"></div>`;
            
            if (i % 2 === 0 && (i/2 - 1) < msgs.length) {
                container.innerHTML += `<div class="ads-section"><div>${msgs[i/2 - 1]}</div><a href="https://m.me/100088924357778" class="btn-buy" style="width:220px; margin:20px auto;">Đặt Lịch Làm Đẹp</a></div>`;
            }
        }
        track.innerHTML += track.innerHTML;

        function setLang(lang) {
            const data = (lang === 'vi') ? { w: "Cảm ơn quý khách, chúc quý khách một ngày thật nhiều may mắn, nhiều niềm vui và nhiều hạnh phúc.", a: msgs, b: "Đặt Hàng Ngay" } : { w: "Thank you, wishing you a day full of luck, joy, and happiness.", a: ["Your beauty is our endless inspiration.", "Let Hana Nails honor your noble style.", "Class is in your hands, style is in your choice.", "Our mission is to highlight the uniqueness in every customer.", "Every design is a special gift for your beauty.", "Assert your leading style with our masterpieces.", "Your satisfaction is the measure of our art.", "Become the most radiant version of yourself today."], b: "Order Now" };
            document.getElementById('welcome-msg').textContent = data.w;
            document.querySelectorAll('.btn-buy').forEach(el => el.textContent = data.b);
        }
    </script>
</body>
</html>
