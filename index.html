<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hana Nails Couture</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400&display=swap');
        :root { --gold: #d4af37; --deep-purple: #1a0b2e; --text-light: #ffffff; }
        body { background-color: var(--deep-purple); color: var(--text-light); font-family: 'Montserrat', sans-serif; margin: 0; }

        .welcome-msg { text-align: center; color: var(--gold); padding: 12px; font-family: 'Playfair Display', serif; font-size: 1.2em; border-bottom: 1px solid var(--gold); background: #0e061a; }
        
        /* Header đã tối ưu bố cục */
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: #1a0b2e; position: sticky; top: 0; z-index: 1000; flex-wrap: wrap; gap: 15px; }
        .logo { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--gold); border: 1px solid var(--gold); padding: 5px 15px; white-space: nowrap; }
        .nav-btn-group { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        
        .slider-container { width: 100%; max-width: 600px; height: 350px; margin: 20px auto; border: 2px solid var(--gold); border-radius: 8px; overflow: hidden; position: relative;
            background: #1a0b2e;
            background-image: radial-gradient(circle, #2d164d 0%, #1a0b2e 100%), url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><text x="5" y="75" font-family="serif" font-size="80" fill="%23d4af37" opacity="0.15">✿</text></svg>');
        }
        .slide { position: absolute; width: 100%; height: 100%; opacity: 0; transition: opacity 1s ease-in-out; display: flex; align-items: center; justify-content: center; }
        .slide.active { opacity: 1; }
        .slide img { max-width: 90%; max-height: 90%; object-fit: contain; cursor: pointer; border-radius: 4px; }

        .quote-box { text-align: center; max-width: 800px; margin: 20px auto; padding: 20px; color: var(--gold); font-family: 'Playfair Display', serif; border-top: 1px solid #332050; border-bottom: 1px solid #332050; }
        .quote-highlight { font-weight: bold; font-size: 1.2em; display: block; margin-bottom: 5px; }
        
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; padding: 20px; max-width: 1000px; margin: auto; }
        .product-card { background: #2d164d; border-radius: 8px; padding: 10px; border: 1px solid #4a148c; position: relative; }
        .product-img { width: 100%; height: 250px; object-fit: contain; background: #000; border-radius: 4px; cursor: pointer; }
        .code-label { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.6); color: var(--gold); padding: 5px 10px; font-weight: bold; border-radius: 4px; }
        .btn-buy { display: block; margin-top: 10px; padding: 12px; background: var(--gold); color: #000; text-align: center; text-decoration: none; border-radius: 4px; font-weight: bold; font-size: 12px; text-transform: uppercase; }
        
        .action-link { color: var(--gold); text-decoration: none; font-weight: bold; border: 1px solid var(--gold); padding: 6px 12px; border-radius: 4px; font-size: 13px; background: #2d164d; }
        .lang-btn { background: var(--gold); border: none; padding: 6px 10px; cursor: pointer; font-weight: bold; border-radius: 3px; font-size: 13px; }

        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        #lightbox img { max-width: 90%; max-height: 80%; }
        #lightbox-text { color: var(--gold); font-size: 24px; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="welcome-msg" id="welcome">✨ Hana Nails kính chào quý khách ✨</div>
    
    <header>
        <div class="logo">Hana Nails</div>
        <div class="nav-btn-group">
            <a href="tel:0937244764" class="action-link">☎ 0937 244 764</a>
            <!-- Link bản đồ đã cập nhật -->
            <a href="https://maps.app.goo.gl/q2E9Yh7dTTv7u3in6" target="_blank" class="action-link">📍 Bản đồ</a>
            <input type="text" id="search" placeholder="Mã MS..." style="padding:6px; border-radius:4px; width:70px; border:none;">
            <button onclick="searchProduct()" style="background:var(--gold); border:none; cursor:pointer; font-weight:bold; padding:6px 10px; border-radius:4px;">🔍</button>
            <button class="lang-btn" onclick="setLang('vi')">VI</button>
            <button class="lang-btn" onclick="setLang('en')">EN</button>
        </div>
    </header>

    <div class="slider-container" id="slider"></div>
    <section id="main-content"></section>

    <div id="lightbox" onclick="this.style.display='none'">
        <img id="lightbox-img" src="">
        <div id="lightbox-text"></div>
    </div>

    <script>
        const container = document.getElementById('main-content');
        const slider = document.getElementById('slider');
        const totalImages = 72;
        const descriptions = [
            { vi: "Nền đỏ quyến rũ kết hợp họa tiết nhũ vàng kim tinh xảo.", en: "Charming red base combined with delicate gold glitter patterns." },
            { vi: "Tone nude sang trọng điểm xuyết đá quý lấp lánh.", en: "Elegant nude tone accented with sparkling gemstones." },
            { vi: "Sắc đen huyền bí phối cùng họa tiết hoa văn nổi khối.", en: "Mysterious black shade paired with embossed floral patterns." },
            { vi: "Sắc trắng ngọc trai cùng đường vân đá marble đẳng cấp.", en: "Pearl white shade with luxurious marble stone veins." },
            { vi: "Tone pastel dịu dàng với họa tiết vẽ tay thủ công.", en: "Gentle pastel tone with hand-drawn artistic details." }
        ];

        function init() {
            for(let i=1; i<=totalImages; i++) {
                let code = "MS" + i.toString().padStart(2, '0');
                let img = `IMG${i.toString().padStart(2, '0')}.jpg`;
                slider.innerHTML += `<div class="slide ${i===1?'active':''}"><img src="${img}" onclick="showZoom('${img}', '${code}')"></div>`;
            }
            renderProducts('vi');
        }

        function renderProducts(lang) {
            container.innerHTML = '';
            for(let i=1; i<=totalImages; i++) {
                if (i % 2 === 1) container.innerHTML += `<div class="product-grid" id="grid-${Math.ceil(i/2)}"></div>`;
                let code = "MS" + i.toString().padStart(2, '0');
                let desc = descriptions[i % descriptions.length][lang];
                document.getElementById(`grid-${Math.ceil(i/2)}`).innerHTML += `
                    <div class="product-card" id="${code}">
                        <div class="code-label">${code}</div>
                        <img src="IMG${i.toString().padStart(2, '0')}.jpg" class="product-img" onclick="showZoom('IMG${i.toString().padStart(2, '0')}.jpg', '${code}')">
                        <a href="https://m.me/100088924357778?text=Đặt mẫu ${code}" class="btn-buy">${lang=='vi'?'Đặt Mẫu':'Order'} ${code}</a>
                    </div>`;
                if (i % 2 === 0) container.innerHTML += `<div class="quote-box"><p class="quote-highlight">${lang=='vi'?'Đỉnh cao nghệ thuật nail thượng lưu':'Top-tier nail art mastery'}</p><p>${desc}</p></div>`;
            }
        }

        function showZoom(src, code) { 
            document.getElementById('lightbox-img').src = src; 
            document.getElementById('lightbox-text').innerText = code;
            document.getElementById('lightbox').style.display = 'flex'; 
        }

        function setLang(lang) {
            document.getElementById('welcome').innerText = (lang == 'vi') ? "✨ Hana Nails kính chào quý khách ✨" : "✨ Hana Nails welcomes you ✨";
            renderProducts(lang);
        }

        function searchProduct() {
            let val = document.getElementById('search').value.toUpperCase();
            if(val.length === 3 && val.startsWith('MS')) val = 'MS0' + val.substring(2);
            let el = document.getElementById(val);
            if(el) el.scrollIntoView({behavior: 'smooth'});
            else alert("Vui lòng nhập đúng mã (VD: MS01)");
        }

        let slideIndex = 0;
        function showSlides() {
            const slides = document.getElementsByClassName("slide");
            for(let s of slides) s.classList.remove('active');
            slideIndex = (slideIndex + 1) % slides.length;
            slides[slideIndex].classList.add('active');
            setTimeout(showSlides, 4000);
        }
        
        init();
        showSlides();
    </script>
</body>
</html>
