<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hana Nails Couture</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400&display=swap');
        :root { --gold: #d4af37; --deep-purple: #1a0b2e; --text-light: #ffffff; }
        body { background-color: var(--deep-purple); color: var(--text-light); font-family: 'Montserrat', sans-serif; margin: 0; }

        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: #1a0b2e; border-bottom: 1px solid var(--gold); position: sticky; top: 0; z-index: 1000; flex-wrap: wrap; gap: 10px; }
        .logo { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--gold); border: 1px solid var(--gold); padding: 5px 15px; }
        
        .search-container { display: flex; background: #fff; border-radius: 5px; overflow: hidden; height: 35px; }
        .search-container input { border: none; padding: 0 10px; width: 100px; outline: none; }
        .search-container button { background: var(--gold); border: none; padding: 0 15px; cursor: pointer; font-weight: bold; }

        .nav-group { display: flex; align-items: center; gap: 8px; }
        .nav-btn { background: var(--gold); color: #000; padding: 8px 10px; border-radius: 4px; text-decoration: none; font-weight: bold; font-size: 10px; text-transform: uppercase; border: none; cursor: pointer; }
        .action-link { font-size: 11px; color: #fff; text-decoration: none; background: #332050; padding: 8px 10px; border-radius: 4px; border: 1px solid var(--gold); }

        /* Slider ảnh cao cấp */
        .slider-wrapper { position: relative; width: 100%; max-width: 600px; height: 300px; margin: 20px auto; overflow: hidden; border: 2px solid var(--gold); border-radius: 8px; }
        .slider-img { position: absolute; width: 100%; height: 100%; object-fit: contain; background: #000; opacity: 0; transition: opacity 1s ease-in-out; cursor: pointer; }
        .slider-img.active { opacity: 1; }

        .marquee-container { background: #0e061a; color: var(--gold); padding: 10px 0; border-bottom: 1px solid #332050; font-style: italic; }
        .ads-section { text-align: center; padding: 30px 5%; font-family: 'Playfair Display', serif; font-size: 16px; color: var(--gold); font-style: italic; }
        .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; padding: 20px; max-width: 1000px; margin: auto; }
        .product-card { background: #2d164d; border-radius: 8px; padding: 10px; border: 1px solid #4a148c; position: relative; }
        .product-img { width: 100%; height: 250px; object-fit: contain; background: #000; border-radius: 4px; cursor: pointer; }
        .code-label { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.6); color: var(--gold); padding: 5px 10px; font-weight: bold; border-radius: 4px; }
        .btn-buy { display: block; margin-top: 10px; padding: 12px; background: var(--gold); color: #000; text-align: center; text-decoration: none; border-radius: 4px; font-weight: bold; font-size: 12px; text-transform: uppercase; }

        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; }
        #lightbox img { max-width: 90%; max-height: 90%; }
    </style>
</head>
<body>

    <header>
        <div class="logo">Hana Nails</div>
        <div class="search-container">
            <input type="text" id="search" placeholder="Nhập MS...">
            <button onclick="searchProduct()">🔍</button>
        </div>
        <div class="nav-group">
            <a href="tel:0937244764" class="action-link">☎ 0937 244 764</a>
            <a href="https://maps.app.goo.gl/aBvmAQfMeuD5JrMMA" target="_blank" class="action-link">📍 Bản đồ</a>
            <button class="nav-btn" onclick="setLang('vi')">VI</button>
            <button class="nav-btn" onclick="setLang('en')">EN</button>
        </div>
    </header>

    <!-- Slider ảnh phía trên -->
    <div class="slider-wrapper" id="top-slider"></div>

    <div class="marquee-container">
        <marquee scrollamount="4">✨ Hana Nails - Đẳng cấp nghệ thuật trên đôi tay quý khách | Tôn vinh vẻ đẹp độc bản ✨</marquee>
    </div>

    <div id="lightbox" onclick="this.style.display='none'"><img id="lightbox-img" src=""></div>
    <section id="main-content"></section>

    <script>
        const container = document.getElementById('main-content');
        const sliderWrapper = document.getElementById('top-slider');

        // Khởi tạo slider và lưới sản phẩm
        for(let i=1; i<=72; i++) {
            let code = "MS" + i.toString().padStart(2, '0');
            let imgName = `IMG${i.toString().padStart(2, '0')}.jpg`;

            // Thêm vào Slider
            sliderWrapper.innerHTML += `<img src="${imgName}" class="slider-img" onclick="showZoom('${imgName}')">`;

            // Thêm vào lưới sản phẩm
            if (i % 2 === 1) container.innerHTML += `<div class="product-grid" id="grid-${Math.ceil(i/2)}"></div>`;
            document.getElementById(`grid-${Math.ceil(i/2)}`).innerHTML += `
                <div class="product-card" id="${code}">
                    <div class="code-label">${code}</div>
                    <img src="${imgName}" class="product-img" onclick="showZoom('${imgName}')">
                    <a href="https://m.me/100088924357778?text=Tôi muốn đặt mẫu ${code}" class="btn-buy">Đặt Mẫu ${code}</a>
                </div>`;
            
            // Xen kẽ câu quảng cáo (dùng danh sách câu cũ của anh)
            const msgs = ["Vẻ đẹp của quý khách là nguồn cảm hứng bất tận của chúng tôi.", "Hãy để Hana Nails tôn vinh phong thái quý phái của riêng bạn.", "Đẳng cấp nằm trong tầm tay, phong cách nằm ở sự lựa chọn của bạn.", "Sứ mệnh của chúng tôi là làm nổi bật sự độc bản trong mỗi quý khách hàng.", "Từng đường nét thiết kế là một món quà dành riêng cho vẻ đẹp của bạn.", "Khẳng định vị thế người dẫn đầu phong cách với những tuyệt phẩm nail.", "Sự hài lòng của quý khách chính là thước đo giá trị cho nghệ thuật của chúng tôi.", "Trở thành phiên bản rực rỡ nhất của chính mình ngay từ hôm nay.", "Đôi tay là tấm gương phản chiếu tâm hồn và gu thẩm mỹ đỉnh cao.", "Chúng tôi kiến tạo nên những tác phẩm nghệ thuật trên đôi tay bạn.", "Nâng niu giá trị bản thân bắt đầu từ việc chăm chút cho đôi bàn tay.", "Sự tinh tế của quý khách xứng đáng với những dịch vụ thượng hạng nhất.", "Hana Nails - Nơi vẻ đẹp được định nghĩa lại bởi sự hoàn mỹ.", "Hãy để mỗi ngón tay kể một câu chuyện về phong cách sống của bạn.", "Quý khách là khách hàng đặc biệt, và xứng đáng với những trải nghiệm tuyệt vời.", "Đẹp một cách khác biệt - Đó là lời cam kết của Hana Nails.", "Tự tin sải bước với bộ móng hoàn hảo chỉ dành riêng cho chủ nhân xứng tầm.", "Vẻ đẹp kiêu sa, bắt trọn ánh nhìn trong từng cử động.", "Đơn giản là đỉnh cao của sự sang trọng.", "Bản lĩnh và dịu dàng - đó là vẻ đẹp của quý khách.", "Hana Nails - Tôn vinh nét đẹp độc tôn của chính bạn.", "Đừng chỉ làm đẹp, hãy tỏa sáng theo cách riêng của bạn.", "Chạm vào tinh hoa, trải nghiệm đẳng cấp nail thượng lưu.", "Quý khách luôn là ưu tiên hàng đầu, là chủ nhân của không gian này."];
            if (i % 2 === 0 && (i/2 - 1) < msgs.length) {
                container.innerHTML += `<div class="ads-section">${msgs[i/2 - 1]}</div>`;
            }
        }

        // Logic chạy Slider (4 giây/ảnh)
        let slideIndex = 0;
        const slides = document.getElementsByClassName("slider-img");
        function showSlides() {
            for (let i = 0; i < slides.length; i++) slides[i].classList.remove("active");
            slideIndex++;
            if (slideIndex > slides.length) slideIndex = 1;
            slides[slideIndex-1].classList.add("active");
            setTimeout(showSlides, 4000); // 4 giây
        }
        showSlides();

        function showZoom(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }

        function searchProduct() {
            let val = document.getElementById('search').value.toUpperCase();
            if(val.length === 3 && val.startsWith('MS')) val = 'MS0' + val.substring(2);
            let el = document.getElementById(val);
            if(el) el.scrollIntoView({behavior: 'smooth'});
            else alert("Vui lòng nhập đúng mã (Ví dụ: MS01)");
        }

        function setLang(lang) {
            const data = (lang === 'vi') ? { b: "Đặt Mẫu" } : { b: "Order Model" };
            document.querySelectorAll('.btn-buy').forEach((el, index) => {
                let code = (index + 1).toString().padStart(2, '0');
                el.textContent = data.b + " MS" + code;
            });
        }
    </script>
</body>
</html>
