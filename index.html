<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hana Nails Couture | Tuyệt Tác Móng Tay Thượng Lưu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap');
        
        :root { 
            --gold: #d4af37; 
            --deep-purple: #1a0b2e; 
            --deep-purple-lighter: #2d164d;
            --text-light: #ffffff; 
            --text-muted: #e0e0e0;
        }

        body { 
            background-color: var(--deep-purple); 
            color: var(--text-light); 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; 
            overflow-x: hidden;
        }

        .welcome-msg { 
            text-align: center; 
            color: var(--gold); 
            padding: 15px 20px; 
            font-family: 'Playfair Display', serif; 
            font-size: 1.3em; 
            font-weight: 500;
            border-bottom: 1px solid var(--gold); 
            background: #0e061a; 
            letter-spacing: 0.5px;
        }
        
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 5%; 
            background: #1a0b2e; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            flex-wrap: wrap; 
            gap: 15px; 
            border-bottom: 1px solid #332050;
        }
        
        .logo { 
            font-family: 'Playfair Display', serif; 
            font-size: 24px; 
            font-weight: 700;
            color: var(--gold); 
            border: 2px solid var(--gold); 
            padding: 8px 20px; 
            white-space: nowrap; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .nav-btn-group { 
            display: flex; 
            gap: 10px; 
            align-items: center; 
            flex-wrap: wrap; 
        }
        
        .slider-section {
            text-align: center;
            padding: 30px 20px 10px;
        }
        .slider-title {
            font-family: 'Playfair Display', serif;
            font-size: 2em;
            color: var(--gold);
            margin-bottom: 10px;
        }
        .slider-subtitle {
            font-weight: 300;
            color: var(--text-muted);
            font-size: 1em;
            max-width: 600px;
            margin: 0 auto 20px;
        }

        .slider-container { 
            width: 100%; 
            max-width: 700px;
            height: 400px;
            margin: 0 auto 30px; 
            border: 3px solid var(--gold);
            border-radius: 12px;
            overflow: hidden; 
            position: relative; 
            background: #1a0b2e; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .slide { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            opacity: 0; 
            transition: opacity 1s ease-in-out, transform 1s ease-in-out;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transform: scale(1.05);
        }
        .slide.active { 
            opacity: 1; 
            transform: scale(1);
        }
        .slide img { 
            max-width: 95%; 
            max-height: 95%; 
            object-fit: contain; 
            cursor: pointer; 
            border-radius: 6px; 
            transition: transform 0.3s ease;
        }
        .slide img:hover {
            transform: scale(1.03);
        }
        
        .code-overlay { 
            position: absolute; 
            top: 15px; 
            right: 15px; 
            background: rgba(0,0,0,0.7); 
            color: var(--gold); 
            padding: 7px 14px; 
            font-weight: 600; 
            font-size: 14px;
            border-radius: 6px; 
            pointer-events: none; 
            letter-spacing: 0.5px;
        }

        .quote-box { 
            text-align: center; 
            max-width: 850px; 
            margin: 30px auto; 
            padding: 25px; 
            color: var(--gold); 
            font-family: 'Playfair Display', serif; 
            border-top: 1px solid #332050; 
            border-bottom: 1px solid #332050; 
            background: rgba(45, 22, 77, 0.3);
            border-radius: 8px;
        }
        .quote-highlight { 
            font-weight: 700; 
            font-size: 1.4em; 
            display: block; 
            margin-bottom: 8px; 
            letter-spacing: 0.5px;
        }
        .quote-desc {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            color: var(--text-muted);
            font-style: italic;
            line-height: 1.6;
        }
        
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 25px; 
            padding: 20px 5%; 
            max-width: 1100px; 
            margin: auto; 
        }
        
        .product-card { 
            background: var(--deep-purple-lighter); 
            border-radius: 12px; 
            padding: 15px; 
            border: 1px solid #4a148c; 
            position: relative; 
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .product-img { 
            width: 100%; 
            height: 280px;
            object-fit: contain; 
            background: #000; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: opacity 0.3s ease;
        }
        .product-img:hover {
            opacity: 0.9;
        }
        
        .code-label { 
            position: absolute; 
            top: 25px; 
            left: 25px; 
            background: rgba(0,0,0,0.7); 
            color: var(--gold); 
            padding: 6px 12px; 
            font-weight: 600; 
            border-radius: 6px; 
        }
        
        .btn-buy { 
            display: block; 
            margin-top: 15px; 
            padding: 14px; 
            background: var(--gold); 
            color: #000; 
            text-align: center; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: 700; 
            font-size: 13px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            transition: background 0.3s ease, transform 0.2s ease;
        }
        .btn-buy:hover {
            background: #f1c40f;
            transform: scale(1.02);
        }
        
        .action-link { 
            color: var(--gold); 
            text-decoration: none; 
            font-weight: 600; 
            border: 2px solid var(--gold); 
            padding: 8px 16px; 
            border-radius: 6px; 
            font-size: 14px; 
            background: var(--deep-purple-lighter); 
            transition: background 0.3s ease, color 0.3s ease;
        }
        .action-link:hover {
            background: var(--gold);
            color: #000;
        }
        
        .lang-btn { 
            background: var(--gold); 
            border: none; 
            padding: 8px 12px; 
            cursor: pointer; 
            font-weight: 700; 
            border-radius: 6px; 
            font-size: 14px; 
            color: #000;
            transition: background 0.3s ease;
        }
        .lang-btn.active {
            background: #b8932d;
        }

        #lightbox { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.95);
            z-index: 2000; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            cursor: zoom-out;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        #lightbox.open {
            display: flex;
            opacity: 1;
        }
        #lightbox img { 
            max-width: 90%; 
            max-height: 85%; 
            object-fit: contain;
            border: 4px solid var(--gold);
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.5);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }
        #lightbox.open img {
            transform: scale(1);
        }
        #lightbox-text { 
            color: var(--gold); 
            font-size: 28px; 
            margin-top: 20px; 
            font-weight: 700; 
            font-family: 'Playfair Display', serif;
            letter-spacing: 1px;
        }
        .close-lightbox {
            position: absolute;
            top: 30px;
            right: 40px;
            color: #fff;
            font-size: 50px;
            font-weight: 300;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="welcome-msg" id="welcome">✨ Hana Nails Couture | Nơi Vẻ Đẹp Thượng Lưu Được Đánh Thức ✨</div>
    
    <header>
        <div class="logo">Hana Nails</div>
        <div class="nav-btn-group">
            <a href="tel:0937244764" class="action-link">☎ 0937 244 764</a>
            <a href="https://maps.app.goo.gl/q2E9Yh7dTTv7u3in6" target="_blank" class="action-link">📍 Chỉ Đường</a>
            <input type="text" id="search" placeholder="Mã MS..." style="padding:9px; border-radius:6px; width:80px; border:1px solid #4a148c; background:#0e061a; color:#fff; font-size:14px;">
            <button onclick="searchProduct()" style="background:var(--gold); border:none; cursor:pointer; font-weight:700; padding:9px 12px; border-radius:6px; color:#000;">🔍</button>
            <button class="lang-btn active" onclick="setLang('vi')">VI</button>
            <button class="lang-btn" onclick="setLang('en')">EN</button>
        </div>
    </header>

    <section class="slider-section">
        <h2 class="slider-title" id="slider-title">Tuyệt Tác Xu Hướng</h2>
        <p class="slider-subtitle" id="slider-subtitle">Khám phá ngay những mẫu móng độc quyền.</p>
        <div class="slider-container" id="slider"></div>
    </section>

    <section id="main-content"></section>

    <div id="lightbox" onclick="closeZoom()">
        <span class="close-lightbox">×</span>
        <img id="lightbox-img" src="">
        <div id="lightbox-text"></div>
    </div>

    <script>
        const container = document.getElementById('main-content');
        const slider = document.getElementById('slider');
        const totalImages = 72;
        
        // Đã cập nhật ID Fanpage mới: 61591461479844
        const MESSENGER_LINK = "https://m.me/61591461479844"; 

        const descriptions = [
            { vi: "Sắc đỏ quyến rũ, kiêu sa phối cùng nhũ vàng kim tinh xảo.", en: "Charming, elegant red paired with intricate gold glitter." },
            { vi: "Tone nude thời thượng điểm xuyết đá quý lấp lánh.", en: "Trendy nude tone accented with sparkling gemstones." },
            { vi: "Sắc đen huyền bí kết hợp cùng họa tiết hoa văn nổi khối 3D.", en: "Mysterious black combined with artistic 3D embossed patterns." },
            { vi: "Sắc trắng ngọc trai thuần khiết, phối vân đá marble đẳng cấp.", en: "Pure pearl white with luxurious marble veins." },
            { vi: "Tone pastel dịu dàng với họa tiết vẽ tay thủ công tỉ mỉ.", en: "Gentle pastel tone with meticulously hand-drawn details." }
        ];

        function init() {
            for(let i=1; i<=totalImages; i++) {
                let code = "MS" + i.toString().padStart(2, '0');
                let img = `IMG${i.toString().padStart(2, '0')}.jpg`;
                slider.innerHTML += `
                    <div class="slide ${i===1?'active':''}">
                        <div class="code-overlay">${code}</div>
                        <img src="${img}" onclick="event.stopPropagation(); showZoom('${img}', '${code}')">
                    </div>`;
            }
            renderProducts('vi');
        }

        function renderProducts(lang) {
            container.innerHTML = '';
            for(let i=1; i<=totalImages; i++) {
                if (i % 2 === 1) container.innerHTML += `<div class="product-grid" id="grid-${Math.ceil(i/2)}"></div>`;
                let code = "MS" + i.toString().padStart(2, '0');
                let desc = descriptions[i % descriptions.length][lang];
                
                let orderMsg = lang === 'vi' ? `Tôi muốn sở hữu mẫu ${code}. Tư vấn cho tôi!` : `I want to order ${code}. Please consult me!`;
                let messengerUrl = `${MESSENGER_LINK}?text=${encodeURIComponent(orderMsg)}`;

                document.getElementById(`grid-${Math.ceil(i/2)}`).innerHTML += `
                    <div class="product-card" id="${code}">
                        <div class="code-label">${code}</div>
                        <img src="IMG${i.toString().padStart(2, '0')}.jpg" class="product-img" onclick="showZoom('IMG${i.toString().padStart(2, '0')}.jpg', '${code}')">
                        <a href="${messengerUrl}" class="btn-buy" target="_blank">${lang=='vi'?'Sở Hữu Ngay':'Order Now'} ${code}</a>
                    </div>`;
                
                if (i % 2 === 0) container.innerHTML += `<div class="quote-box"><p class="quote-highlight">${lang=='vi'?'Tuyệt Tác Nail Art':'Nail Art Masterpiece'}</p><p class="quote-desc">${desc}</p></div>`;
            }
        }

        function showZoom(src, code) { 
            const lightbox = document.getElementById('lightbox');
            document.getElementById('lightbox-img').src = src; 
            document.getElementById('lightbox-text').innerText = code;
            lightbox.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeZoom() {
            document.getElementById('lightbox').classList.remove('open');
            document.body.style.overflow = '';
        }

        function setLang(lang) {
            document.getElementById('welcome').innerText = (lang == 'vi') ? "✨ Hana Nails Couture | Nơi Vẻ Đẹp Thượng Lưu Được Đánh Thức ✨" : "✨ Hana Nails Couture | Where Elite Beauty Is Awakened ✨";
            renderProducts(lang);
        }

        function searchProduct() {
            let val = document.getElementById('search').value.toUpperCase().trim();
            if(val.startsWith('MS')) {
                let numPart = val.substring(2);
                if(numPart.length < 2 && !isNaN(numPart)) val = 'MS' + numPart.padStart(2, '0');
            } else if (!isNaN(val)) val = 'MS' + val.padStart(2, '0');
            
            let el = document.getElementById(val);
            if(el) el.scrollIntoView({behavior: 'smooth', block: 'center'});
            else alert("Không tìm thấy mã!");
        }

        let slideIndex = 0;
        function showSlides() {
            const slides = document.getElementsByClassName("slide");
            for(let s of slides) s.classList.remove('active');
            slideIndex = (slideIndex + 1) % slides.length;
            slides[slideIndex].classList.add('active');
            setTimeout(showSlides, 5000);
        }
        
        init();
        showSlides();
    </script>
</body>
</html>
